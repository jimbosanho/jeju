<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>濟州島行程總覽｜週曆</title>
  <meta name="description" content="濟州島5天4夜行程週曆，X軸日期、Y軸時間，依活動類型著色。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #181b27;
      --surface2: #21253a;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0f0f0;
      --dim:      #666;
      --hour-h:   84px;
      --time-w:   58px;
      --day-min:  160px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 1.5rem 1.5rem 1rem;
      display: flex; align-items: flex-end;
      justify-content: space-between; flex-wrap: wrap; gap: 1rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: 900;
      background: linear-gradient(135deg, #f2cc8f, #e07a5f);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    header p { color: var(--dim); font-size: 0.82rem; margin-top: 4px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--dim); padding: 8px 18px; border-radius: 50px;
      font-size: 0.82rem; text-decoration: none; transition: 0.2s; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ── Legend ── */
    .legend {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      padding: 1rem 1.5rem 0.75rem;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #aaa; }
    .legend-dot  { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }
    .legend-item.meal .legend-dot { border: 2px solid rgba(255,255,255,0.35); }

    /* ── Highlight band legend ── */
    .band-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; padding: 0 1.5rem 0.75rem; }
    .band-legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #aaa; }
    .band-swatch { width: 32px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    /* ── Scroll hint ── */
    .scroll-hint { text-align: center; font-size: 0.72rem; color: var(--dim); padding: 4px 0 0; display: none; }

    /* ── Calendar Wrapper ── */
    .cal-outer { padding: 1rem 1rem 3rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .cal-outer::-webkit-scrollbar { height: 6px; }
    .cal-outer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .cal-inner { min-width: calc(var(--time-w) + var(--day-min) * 5); }

    /* ── Day Header ── */
    .cal-head {
      display: grid; grid-template-columns: var(--time-w) repeat(5, 1fr);
      position: sticky; top: 0; z-index: 20;
      background: var(--surface2);
      border-radius: 12px 12px 0 0; border: 1px solid var(--border); border-bottom: none;
    }
    .day-head { padding: 12px 8px; text-align: center; border-left: 1px solid var(--border); }
    .day-head .ch-num  { font-size: 0.82rem; font-weight: 700; }
    .day-head .ch-date { font-size: 0.65rem; color: var(--dim); margin-top: 2px; }
    .day-head .ch-rgn  { font-size: 0.58rem; color: var(--dim); opacity: .7; margin-top: 1px; }

    /* ── Grid Body ── */
    .cal-body {
      display: grid; grid-template-columns: var(--time-w) repeat(5, 1fr);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 12px 12px; overflow: hidden;
      background: var(--surface); position: relative;
    }

    /* Time column */
    .time-col {
      position: sticky; left: 0; z-index: 10;
      background: var(--surface2); border-right: 1px solid var(--border);
    }
    .time-slot {
      height: var(--hour-h);
      display: flex; align-items: flex-start; justify-content: flex-end;
      padding: 4px 6px 0 0;
      font-size: 0.62rem; font-weight: 600; color: var(--dim);
      border-bottom: 1px solid var(--border); position: relative;
    }
    /* Highlighted time slots in time column */
    .time-slot.hl-lunch  { background: rgba(230,180,60,0.15); color: #e6b43c; }
    .time-slot.hl-dinner { background: rgba(220,100,60,0.15); color: #e06440; }

    /* Day columns */
    .day-col { position: relative; border-left: 1px solid var(--border); }
    .hour-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--border); pointer-events: none; }

    /* ── Global time highlight bands (lunch/dinner) ── */
    .time-band {
      position: absolute; left: 0; right: 0; pointer-events: none; z-index: 1;
    }

    /* ── Meal band (per-event tinted bg) ── */
    .meal-band { position: absolute; left: 0; right: 0; pointer-events: none; z-index: 1; }

    /* ── Event Block ── */
    .event {
      position: absolute; left: 3px; right: 3px;
      border-radius: 8px; display: flex; flex-direction: column;
      justify-content: flex-start; padding: 4px 30px 4px 7px;
      overflow: hidden; /* 嚴格限制在時段高度內，不撐高 */
      cursor: default; z-index: 3; color: #fff;
      transition: filter .2s, transform .15s; border: 1px solid rgba(255,255,255,0.15);
    }
    .event:hover { filter: brightness(1.25); transform: scaleX(1.03); z-index: 15; }
    .event .ev-icon  { font-size: 0.82rem; line-height: 1; margin-bottom: 2px; }
    .event .ev-label {
      font-size: 0.75rem; font-weight: 700; line-height: 1.3;
      word-break: break-all;
    }
    .event .ev-time  { font-size: 0.6rem; opacity: .8; margin-top: 2px; }
    
    .ev-nav-link {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 26px; height: 26px; border-radius: 6px; 
      background: rgba(255,255,255,0.2); color: #fff;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 0.85rem; z-index: 20;
      transition: background .2s, transform .2s; border: 1px solid rgba(255,255,255,0.3);
    }
    .ev-nav-link:hover { background: rgba(255,255,255,0.4); transform: translateY(-50%) scale(1.1); }
    
    .event.tiny { padding: 2px 5px; justify-content: center; }
    .event.tiny .ev-time, .event.tiny .ev-nav-link { display: none; }
    .event.tiny .ev-icon { font-size: 0.65rem; margin: 0; }
    .event.tiny .ev-label { font-size: 0.62rem; font-weight: 600; line-height: 1.2; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .event.is-meal   { box-shadow: inset 3px 0 0 rgba(255,255,255,0.45); border-width: 1.5px; }

    /* Type colors — 同類型使用同色 */
    .ec-transport  { background: linear-gradient(150deg, #546e7a, #37474f); }
    /* 三餐統一使用同色（溫暖橙色） */
    .ec-breakfast,
    .ec-lunch,
    .ec-dinner     { background: linear-gradient(150deg, #e07b30, #b55a18); }
    .ec-attraction { background: linear-gradient(150deg, #3a86c8, #1f6199); }
    .ec-activity   { background: linear-gradient(150deg, #27ae60, #1a7d44); }
    .ec-shopping   { background: linear-gradient(150deg, #8e44ad, #6c2f82); }
    .ec-flight     { background: linear-gradient(150deg, #00b894, #007a61); }
    .ec-hotel      { background: linear-gradient(150deg, #607d8b, #455a64); }
    .ec-cafe       { background: linear-gradient(150deg, #d4a843, #a07a28); }

    /* ── Transit Chip ── */
    .transit-chip {
      position: absolute; left: 3px; right: 3px;
      border-radius: 6px; z-index: 4;
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 6px; text-decoration: none; color: #aaa;
      transition: background .2s, color .2s;
      overflow: hidden; /* 嚴格限制在間隔高度內 */
    }
    .transit-chip:hover { background: rgba(116,185,232,0.12); color: #74b9e8; border-color: rgba(116,185,232,0.3); }
    .transit-chip .tc-info { font-size: 0.65rem; line-height: 1.2; white-space: normal; }
    .transit-chip .tc-nav  { font-size: 0.62rem; flex-shrink: 0; margin-left: 4px; opacity: .8; }
    .transit-chip.tiny-chip .tc-info { display: none; }
    .transit-chip.tiny-chip { justify-content: center; }

    /* ── Tooltip ── */
    .tt {
      position: fixed; z-index: 9999;
      background: #1c2036; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 12px 16px;
      max-width: 280px; min-width: 190px;
      pointer-events: none; opacity: 0;
      transform: translateY(6px); transition: opacity .2s, transform .2s;
      box-shadow: 0 8px 32px rgba(0,0,0,.6); font-size: 0.82rem;
    }
    .tt.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .tt .tt-time  { font-size:.7rem; color:var(--dim); margin-bottom:4px; }
    .tt .tt-title { font-weight:700; font-size:.9rem; margin-bottom:5px; line-height:1.4; }
    .tt .tt-desc  { color:#aaa; line-height:1.6; font-size:.78rem; }
    .tt .tt-tip { margin-top:8px; padding:7px 10px;
      background:rgba(242,204,143,.08); border:1px solid rgba(242,204,143,.15);
      border-radius:7px; color:#f2cc8f; font-size:.72rem; line-height:1.5; }
    .tt .tt-drive { margin-top:8px; padding:7px 10px;
      background:rgba(116,185,232,.08); border:1px solid rgba(116,185,232,.2);
      border-radius:7px; color:#74b9e8; font-size:.72rem; line-height:1.5;
      display:flex; align-items:center; gap:6px; }
    .tt .tt-drive a { color:#74b9e8; font-weight:700; text-decoration:none; }
    .tt .tt-drive a:hover { text-decoration:underline; }

    footer {
      text-align:center; padding:1.5rem 1rem;
      font-size:.78rem; color:var(--dim); border-top:1px solid var(--border);
    }
    
    @media (max-width: 700px) {
      .scroll-hint { display: block; }
      .cal-outer { padding: 1rem 0 3rem; scroll-snap-type: x mandatory; }
      .cal-inner { min-width: max-content; }
      /* Override desktop grid columns to show exactly 1 day per screen */
      .cal-head, .cal-body { grid-template-columns: var(--time-w) repeat(5, calc(100vw - var(--time-w))); }
      .day-col, .day-head { scroll-snap-align: start; scroll-snap-stop: always; }
      .tt {
        max-width: 90vw; width: 340px;
        position: fixed;
        left: 50% !important; top: auto !important; bottom: 20px !important;
        transform: translate(-50%, 20px) !important;
      }
      .tt.show { transform: translate(-50%, 0) !important; }
    }
  </style>
</head>

}

// ── Build Column Headers ──
const calHead = document.getElementById('calHead');
days.forEach((d, i) => {
  const div = document.createElement('div');
  div.className = 'day-head';
  div.innerHTML = `
    <div class="ch-num" style="color:${DAY_COLORS[i]}">${d.label}</div>
    <div class="ch-date">${d.date}</div>
    <div class="ch-rgn">${d.region}</div>`;
  calHead.appendChild(div);
});

// ── Build Body ──
const calBody = document.getElementById('calBody');
const totalH  = `calc(var(--hour-h) * ${TOTAL_HOURS})`;

// 1. Time Column (with highlight slot classes)
const timeCol = document.createElement('div');
timeCol.className = 'time-col';
for (let h = START_HOUR; h <= END_HOUR; h++) {
  const slot = document.createElement('div');
  slot.className = 'time-slot';
  // Check if this hour falls in a highlight band
  for (const band of HIGHLIGHT_BANDS) {
    const bH = parseInt(band.start);
    if (h === bH) { slot.classList.add(band.timeCls); break; }
  }
  if (h < END_HOUR) slot.textContent = String(h).padStart(2,'0') + ':00';
  timeCol.appendChild(slot);
}
calBody.appendChild(timeCol);

// 2. Day Columns
days.forEach(day => {
  const col = document.createElement('div');
  col.className = 'day-col';
  col.style.height = totalH;

  // Hour lines
  for (let h = 0; h < TOTAL_HOURS; h++) {
    const line = document.createElement('div');
    line.className = 'hour-line';
    line.style.top = `calc(var(--hour-h) * ${h})`;
    col.appendChild(line);
  }

  // ── Global Highlight Bands ──
  for (const band of HIGHLIGHT_BANDS) {
    const tf = toFrac(band.start);
    const hf = toFrac(band.end) - tf;
    const bDiv = document.createElement('div');
    bDiv.className = 'time-band';
    bDiv.style.top        = `calc(${TOTAL_HOURS} * var(--hour-h) * ${tf})`;
    bDiv.style.height     = `calc(${TOTAL_HOURS} * var(--hour-h) * ${hf})`;
    bDiv.style.background = band.color;
    bDiv.style.borderLeft = `3px solid ${band.borderColor}`;
    col.appendChild(bDiv);
  }

  // ── Meal Bands (per event tinted bg) ──
  day.events.forEach(ev => {
    if (!TYPE_META[ev.type].isMeal) return;
    const tf = toFrac(ev.start);
    const hf = toFrac(ev.end) - tf;
    const mb = document.createElement('div');
    mb.className = 'meal-band';
    mb.style.top        = `calc(${TOTAL_HOURS} * var(--hour-h) * ${tf})`;
    mb.style.height     = `calc(${TOTAL_HOURS} * var(--hour-h) * ${hf})`;
    mb.style.background = MEAL_BAND_COLOR[ev.type] || 'rgba(255,255,255,.04)';
    col.appendChild(mb);
  });

  // ── Events & Transit Chips ──
  day.events.forEach((ev, idx) => {
    const tf   = toFrac(ev.start);
    const hf   = toFrac(ev.end) - tf;
    const meta = TYPE_META[ev.type] || TYPE_META.attraction;

    // Event block
    const block = document.createElement('div');
    block.className = `event ${meta.cls}${meta.isMeal ? ' is-meal' : ''}`;
    block.style.top    = `calc(${TOTAL_HOURS} * var(--hour-h) * ${tf})`;
    block.style.height = `calc(${TOTAL_HOURS} * var(--hour-h) * ${hf} - 4px)`;
    const mins = hf * TOTAL_HOURS * 60;
    if (mins < 30) block.classList.add('tiny');
    
    let innerHTML = `
      <div class="ev-icon">${ev.icon}</div>
      <div class="ev-label">${ev.label}</div>
      <div class="ev-time">${ev.start}–${ev.end}</div>`;
      
    // Store transit for tooltip & render nav icon if transit payload exists
    if (ev.transit) {
      const url = naverUrl(ev.transit.fLng, ev.transit.fLat, ev.transit.fName,
                           ev.transit.tLng, ev.transit.tLat, ev.transit.tName);
      block.dataset.trDist = ev.transit.dist;
      block.dataset.trDur  = ev.transit.dur;
      block.dataset.trUrl  = url;
      block.dataset.trTo   = ev.transit.tName;
      if (mins >= 22) { // Display direct map link inside the event block if there's space
        innerHTML += `<a href="${url}" class="ev-nav-link" title="開啟導航" target="_blank" rel="noopener">🗺️</a>`;
      }
    }
    
    block.innerHTML = innerHTML;
    block.dataset.time  = `${ev.start} – ${ev.end}`;
    block.dataset.title = `${ev.icon} ${ev.label}`;
    block.dataset.desc  = ev.desc  || '';
    block.dataset.tip   = ev.tip   || '';
    col.appendChild(block);

    // Transit chip (in the gap to next event)
    const next = day.events[idx + 1];
    if (ev.transit && next) {
      const gapStart = toFrac(ev.end);
      const gapEnd   = toFrac(next.start);
      const gapFrac  = gapEnd - gapStart;
      const gapPx    = gapFrac * TOTAL_HOURS * HOUR_PX;

      if (gapPx >= 10) {
        const chip = document.createElement('a');
        chip.className = 'transit-chip';
        if (gapPx < 22) chip.classList.add('tiny-chip');
        chip.href   = naverUrl(ev.transit.fLng, ev.transit.fLat, ev.transit.fName,
                               ev.transit.tLng, ev.transit.tLat, ev.transit.tName);
        chip.target = '_blank';
        chip.rel    = 'noopener';
        chip.style.top    = `calc(${TOTAL_HOURS} * var(--hour-h) * ${gapStart} + 2px)`;
        chip.style.height = `calc(${TOTAL_HOURS} * var(--hour-h) * ${gapFrac} - 4px)`;
        chip.innerHTML = gapPx >= 26
          ? `<span class="tc-info">🚗 ${ev.transit.dist} · ${ev.transit.dur}</span><span class="tc-nav">🗺</span>`
          : `<span class="tc-nav">🗺</span>`;
        col.appendChild(chip);
      }
    }
  });

  calBody.appendChild(col);
});

// ── Tooltip ──
const tt      = document.getElementById('tt');
const ttTime  = document.getElementById('tt-time');
const ttTitle = document.getElementById('tt-title');
const ttDesc  = document.getElementById('tt-desc');
const ttTip   = document.getElementById('tt-tip');
const ttDrive = document.getElementById('tt-drive');

let activeTT = null;

function showTT(el, cx, cy) {
  if (activeTT === el) return;
  ttTime.textContent  = el.dataset.time;
  ttTitle.textContent = el.dataset.title;
  ttDesc.textContent  = el.dataset.desc;
  if (el.dataset.tip) { ttTip.textContent = '💡 ' + el.dataset.tip; ttTip.style.display='block'; }
  else ttTip.style.display='none';
  if (el.dataset.trUrl) {
    const dest = decodeURIComponent(el.dataset.trTo || '下一站');
    ttDrive.innerHTML = `🚗 ${el.dataset.trDist} · ${el.dataset.trDur}　<a href="${el.dataset.trUrl}" target="_blank" rel="noopener">開啟導航→${dest} 🗺</a>`;
    ttDrive.style.display='flex';
  } else ttDrive.style.display='none';

  const isMobile = window.innerWidth <= 700;
  if (!isMobile) {
    const margin=14, tw=tt.offsetWidth||260, th=tt.offsetHeight||100;
    let x=cx+margin, y=cy+margin;
    if (x+tw > window.innerWidth -8)  x=cx-tw-margin;
    if (y+th > window.innerHeight-8)  y=cy-th-margin;
    tt.style.left=x+'px'; tt.style.top=y+'px';
  }
  tt.classList.add('show');
  activeTT = el;
}

document.addEventListener('click', e => {
  const el = e.target.closest('.event');
  if (el) {
    // 預防多次重複點擊相同的 event，可能只是想點裡面的導航按鈕
    if (!e.target.closest('.ev-nav-link')) showTT(el, e.clientX, e.clientY);
  } else if (!e.target.closest('.tt')) { 
    tt.classList.remove('show'); 
    activeTT = null; 
  }
});
</script>
