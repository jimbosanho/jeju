<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>濟州島 5天4夜 自駕之旅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #16222A 0%, #3A6073 100%);
      color: #fff;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 16px 40px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 900;
      text-align: center;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #f2cc8f, #e07a5f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      text-align: center;
      color: rgba(255,255,255,0.7);
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }

    /* ====== Menu Grid ====== */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .menu-card {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 2rem;
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .menu-card::before {
      content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
      opacity: 0; transition: 0.3s;
    }

    .menu-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border-color: rgba(255,255,255,0.3);
    }

    .menu-card:hover::before { opacity: 1; }

    .menu-card .icon { font-size: 3rem; margin-bottom: 1rem; }
    .menu-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    .menu-card p { font-size: 0.85rem; color: rgba(255,255,255,0.7); }

    /* ====== To-Do List ====== */
    .todo-section {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      padding: 2rem;
    }

    .todo-section h3 {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 8px;
    }

    .todo-list {
      list-style: none; display: flex; flex-direction: column; gap: 12px;
    }

    .todo-item {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255, 255, 255, 0.08);
      padding: 12px 16px;
      border-radius: 12px;
      transition: 0.2s;
      cursor: pointer;
    }

    .todo-item:hover { background: rgba(255,255,255,0.12); }

    .todo-item.checked {
      background: rgba(0,0,0,0.1);
      opacity: 0.6;
    }
    .todo-item.checked span { text-decoration: line-through; color: rgba(255,255,255,0.5); }

    .checkbox {
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .todo-item.checked .checkbox {
      background: #4ec9b0; border-color: #4ec9b0;
    }

    .todo-item.checked .checkbox::after {
      content: '✓'; color: #fff; font-weight: 900; font-size: 14px;
    }

    .todo-item span { flex: 1; font-size: 0.95rem; transition: 0.2s; }

    /* Add Task */
    .add-task {
      display: flex; gap: 10px; margin-top: 1rem;
    }
    .add-task input {
      flex: 1; padding: 12px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2);
      color: #fff; font-family: inherit; font-size: 0.95rem; outline: none;
    }
    .add-task input::placeholder { color: rgba(255,255,255,0.4); }
    .add-task input:focus { border-color: #f2cc8f; }
    .add-task button {
      padding: 0 20px; border-radius: 12px; border: none;
      background: #f2cc8f; color: #16222A; font-weight: 700; cursor: pointer;
      transition: 0.2s; font-family: inherit;
    }
    .add-task button:hover { background: #e07a5f; color: #fff; }
    
    .delete-btn {
      opacity: 0; background: none; border: none; color: #ff6b6b; cursor: pointer;
      font-size: 1.1rem; transition: 0.2s; padding: 4px;
    }
    .todo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { transform: scale(1.2); }

    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: 1fr; }
      .container { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🏝️ 濟州島 5天4夜</h1>
    <p class="subtitle">家庭旅遊企劃・行程首頁入口</p>

    <div class="menu-grid">
      <a href="schedule.html" class="menu-card">
        <div class="icon">📅</div>
        <h2>行程週曆預覽</h2>
        <p>橫式時間軸，一眼掌握每天作息與時段安排，附導航捷徑。</p>
      </a>
      
      <a href="daily.html" class="menu-card">
        <div class="icon">🗺️</div>
        <h2>詳細行程清單</h2>
        <p>直式詳細解說，包含景點介紹、雨備方案與行前提醒事項。</p>
      </a>
    </div>

    <div class="todo-section">
      <h3>📝 行前待辦清單 (To-Do List)</h3>
      <ul class="todo-list" id="todo-list">
        <!-- JS generates list here -->
      </ul>
      <form class="add-task" id="todo-form">
        <input type="text" id="todo-input" placeholder="新增待辦事項..." required>
        <button type="submit">新增</button>
      </form>
    </div>
  </div>

  <script>
    const defaultTodos = [
      { id: 1, text: "確認護照效期 (滿6個月以上)", checked: false },
      { id: 2, text: "辦理國際駕照 (監理所)", checked: false },
      { id: 3, text: "預約租車 (確認包含兒童安全座椅)", checked: false },
      { id: 4, text: "網卡/Wi-Fi 分享器預訂", checked: false },
      { id: 5, text: "申請 K-ETA (目前台灣延期免辦，請作最後確認)", checked: false },
      { id: 6, text: "下載 Naver Map 並設定常用地點", checked: false },
      { id: 7, text: "換匯 (準備部分韓元現金)", checked: false },
      { id: 8, text: "購買旅遊平安險/不便險", checked: false },
      { id: 9, text: "班機出發前 24h Web Check-in", checked: false },
    ];

    let todos = JSON.parse(localStorage.getItem('jejuTodos'));
    if (!todos) { todos = defaultTodos; }

    const listEl = document.getElementById('todo-list');
    const formEl = document.getElementById('todo-form');
    const inputEl = document.getElementById('todo-input');

    function render() {
      listEl.innerHTML = '';
      todos.forEach(todo => {
        const li = document.createElement('li');
        li.className = `todo-item ${todo.checked ? 'checked' : ''}`;
        li.innerHTML = `
          <div class="checkbox"></div>
          <span>${todo.text}</span>
          <button class="delete-btn" aria-label="刪除">✖</button>
        `;
        
        li.addEventListener('click', (e) => {
          if(e.target.classList.contains('delete-btn')) {
            todos = todos.filter(t => t.id !== todo.id);
          } else {
            todo.checked = !todo.checked;
          }
          save(); render();
        });
        
        listEl.appendChild(li);
      });
    }

    function save() {
      localStorage.setItem('jejuTodos', JSON.stringify(todos));
    }

    formEl.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if(text) {
        todos.push({ id: Date.now(), text, checked: false });
        inputEl.value = '';
        save(); render();
      }
    });

    render();
  </script>

</body>
</html>
